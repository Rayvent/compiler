<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Python Compiler</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/theme/material-darker.css">

  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/python/python.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/display/placeholder.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/selection/active-line.js"></script>
  <script src="https://cdn.jsdelivr.net/pyodide/v0.29.3/full/pyodide.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --vh: 100vh;
      --bg: #0b1117;
      --panel: #121b24;
      --line: #25384a;
      --green: #4ade80;
      --green2: #22c55e;
      --text: #e8f1f8;
      --muted: #7f93a8;
      --error: #ff6b6b;
    }

    body {
      margin: 0;
      height: var(--vh);
      background: radial-gradient(circle at top, #172636, var(--bg));
      color: var(--text);
      font-family: Inter, Arial, sans-serif;
      overflow: hidden;
    }

    .loader {
      position: fixed;
      inset: 0;
      background: #0b1117;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity .45s ease, visibility .45s ease;
    }

    .loader.hide {
      opacity: 0;
      visibility: hidden;
    }

    .loader-logo {
      font-size: 34px;
      font-weight: 950;
      letter-spacing: -1px;
      color: white;
      animation: pulse 1.2s infinite ease-in-out;
    }

    .loader-logo span,
    .logo span {
      color: var(--green);
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        opacity: .75;
      }

      50% {
        transform: scale(1.06);
        opacity: 1;
      }
    }

    .app {
      height: var(--vh);
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 14px;
    }

    .topbar {
      height: 56px;
      background: rgba(18, 27, 36, .9);
      border: 1px solid var(--line);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px 0 18px;
      flex-shrink: 0;
      backdrop-filter: blur(14px);
    }

    .logo {
      font-size: 20px;
      font-weight: 950;
      white-space: nowrap;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    button {
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .run-btn {
      border: none;
      background: linear-gradient(135deg, var(--green), var(--green2));
      color: #07110b;
      padding: 12px 22px;
      border-radius: 14px;
      font-weight: 950;
      cursor: pointer;
      font-size: 15px;
      transition: transform .2s ease, opacity .2s ease;
    }

    .run-btn:hover {
      transform: translateY(-1px);
    }

    .run-btn:disabled {
      opacity: .55;
      cursor: not-allowed;
    }

    .small-btn {
      border: 1px solid var(--line);
      background: #182634;
      color: var(--text);
      padding: 11px 15px;
      border-radius: 14px;
      font-weight: 900;
      cursor: pointer;
    }

    .small-btn.clear {
      color: #b8ffd0;
    }

    #tabBtn {
      display: none;
    }

    .editor-wrap {
      flex: 1;
      min-height: 0;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      overflow: hidden;
      position: relative;
    }

    .CodeMirror {
      height: 100%;
      font-family: Consolas, Monaco, monospace;
      font-size: 16px;
      line-height: 1.55;
      background: #101820 !important;
      color: var(--text);
    }

    .CodeMirror-gutters {
      background: #0f1821 !important;
      border-right: 1px solid var(--line) !important;
    }

    .CodeMirror-linenumber {
      color: var(--muted) !important;
    }

    .CodeMirror-cursor {
      border-left: 2px solid var(--green) !important;
    }

    .CodeMirror-activeline-background {
      background: rgba(74, 222, 128, .10) !important;
    }

    .CodeMirror-activeline-gutter {
      background: rgba(74, 222, 128, .08) !important;
    }

    .CodeMirror-empty.CodeMirror-focused {
      outline: none;
    }

    .CodeMirror pre.CodeMirror-placeholder {
      color: #6f7f8f !important;
      opacity: .75;
    }

    .console {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: 16px;
      max-height: 42vh;
      background: #07110d;
      border: 1px solid rgba(74, 222, 128, .35);
      border-radius: 22px;
      box-shadow: 0 24px 80px rgba(0,0,0,.65);
      overflow: hidden;
      z-index: 20;
      opacity: 0;
      transform: translateY(24px) scale(.98);
      pointer-events: none;
      transition: opacity .28s ease, transform .28s ease, border-color .2s ease;
    }

    .console.show {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .console.error {
      border-color: rgba(255, 107, 107, .75);
    }

    .console-head {
      height: 48px;
      background: #102017;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px 0 18px;
      font-weight: 950;
      color: var(--green);
    }

    .console.error .console-head {
      background: #251414;
      color: var(--error);
    }

    .close {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,.08);
      color: white;
      font-size: 20px;
      cursor: pointer;
    }

    pre {
      margin: 0;
      padding: 16px;
      white-space: pre-wrap;
      overflow: auto;
      max-height: calc(42vh - 48px);
      color: #c8ffd8;
      font-family: Consolas, Monaco, monospace;
      font-size: 14px;
      line-height: 1.5;
    }

    .console.error pre {
      color: #ffd0d0;
    }

    @media (max-width: 700px) {
      .app {
        padding: 10px;
        gap: 10px;
      }

      .topbar {
        height: 52px;
        border-radius: 16px;
        padding-left: 14px;
        padding-right: 10px;
      }

      .logo {
        font-size: 16px;
      }

      .actions {
        gap: 6px;
      }

      #tabBtn {
        display: inline-block;
      }

      .small-btn {
        padding: 10px 10px;
        font-size: 12px;
      }

      .run-btn {
        padding: 10px 14px;
        font-size: 13px;
      }

      .editor-wrap {
        border-radius: 18px;
      }

      .CodeMirror {
        font-size: 15px;
      }

      .console {
        left: 10px;
        right: 10px;
        bottom: 10px;
        max-height: 45vh;
        border-radius: 18px;
      }

      pre {
        max-height: calc(45vh - 48px);
      }
    }

    @media (max-width: 420px) {
      .logo {
        font-size: 14px;
      }

      .small-btn.clear {
        max-width: 74px;
        overflow: hidden;
        white-space: nowrap;
      }
    }
  </style>
</head>

<body>
  <div class="loader" id="loader">
    <div class="loader-logo">Python<span>Run</span></div>
  </div>

  <div class="app">
    <header class="topbar">
      <div class="logo">Python<span>Run</span></div>

      <div class="actions">
        <button class="small-btn" id="tabBtn">Tab</button>
        <button class="small-btn clear" id="clearBtn">Очистить</button>
        <button class="run-btn" id="runBtn">Run</button>
      </div>
    </header>

    <main class="editor-wrap">
      <textarea id="code" placeholder="print('hello world!')"></textarea>
    </main>
  </div>

  <section class="console" id="console">
    <div class="console-head">
      <span id="consoleTitle">Console</span>
      <button class="close" id="closeConsole">×</button>
    </div>
    <pre id="output"></pre>
  </section>

  <script>
    const runBtn = document.getElementById("runBtn");
    const consoleBox = document.getElementById("console");
    const output = document.getElementById("output");
    const closeConsole = document.getElementById("closeConsole");
    const loader = document.getElementById("loader");
    const tabBtn = document.getElementById("tabBtn");
    const clearBtn = document.getElementById("clearBtn");
    const consoleTitle = document.getElementById("consoleTitle");

    let pyodide = null;
    let mobilePairLock = false;

    const editor = CodeMirror.fromTextArea(document.getElementById("code"), {
      mode: "python",
      theme: "material-darker",
      lineNumbers: true,
      placeholder: "print('hello world!')",
      indentUnit: 4,
      tabSize: 4,
      indentWithTabs: false,
      lineWrapping: false,
      autofocus: true,
      styleActiveLine: true,
      extraKeys: {
        Tab: function(cm) {
          cm.replaceSelection("    ");
        },
        "(": function(cm) {
          insertPair(cm, "(", ")");
        },
        "[": function(cm) {
          insertPair(cm, "[", "]");
        },
        "{": function(cm) {
          insertPair(cm, "{", "}");
        },
        "'": function(cm) {
          insertPair(cm, "'", "'");
        },
        '"': function(cm) {
          insertPair(cm, '"', '"');
        }
      }
    });

    function insertPair(cm, left, right) {
      const selected = cm.getSelection();

      if (selected) {
        cm.replaceSelection(left + selected + right);
      } else {
        cm.replaceSelection(left + right);
        const cursor = cm.getCursor();
        cm.setCursor(cursor.line, cursor.ch - right.length);
      }

      cm.focus();
    }

    editor.on("beforeChange", function(cm, change) {
      if (mobilePairLock) return;
      if (change.origin !== "+input") return;
      if (!change.text || change.text.length !== 1) return;

      const char = change.text[0];

      const pairs = {
        "(": ")",
        "[": "]",
        "{": "}",
        "'": "'",
        '"': '"'
      };

      if (!pairs[char]) return;

      mobilePairLock = true;
      change.update(change.from, change.to, [char + pairs[char]]);

      setTimeout(() => {
        const pos = cm.getCursor();
        cm.setCursor(pos.line, Math.max(0, pos.ch - 1));
        mobilePairLock = false;
      }, 0);
    });

    async function initPyodide() {
      runBtn.disabled = true;

      try {
        pyodide = await loadPyodide();
        runBtn.disabled = false;
        loader.classList.add("hide");
      } catch (err) {
        loader.classList.add("hide");
        showConsole("Ошибка загрузки Python:\n" + String(err), true);
      }
    }

    initPyodide();

    function showConsole(text, isError = false) {
      output.textContent = text || "Программа выполнена без вывода.";
      consoleTitle.textContent = isError ? "Error log" : "Console";
      consoleBox.classList.toggle("error", isError);
      consoleBox.classList.add("show");
    }

    closeConsole.onclick = () => {
      consoleBox.classList.remove("show");
    };

    runBtn.onclick = async () => {
      if (!pyodide) return;

      runBtn.disabled = true;
      showConsole("Выполнение...", false);

      const userCode = editor.getValue();

      if (!userCode.trim()) {
        showConsole("Код пустой. Напиши Python-код и нажми Run.", false);
        runBtn.disabled = false;
        return;
      }

      try {
        pyodide.globals.set("user_code", userCode);

        await pyodide.runPythonAsync(`
import sys
import io
import traceback

stdout_buffer = io.StringIO()
stderr_buffer = io.StringIO()

old_stdout = sys.stdout
old_stderr = sys.stderr

sys.stdout = stdout_buffer
sys.stderr = stderr_buffer

try:
    exec(user_code, globals())
except BaseException:
    traceback.print_exc()

sys.stdout = old_stdout
sys.stderr = old_stderr

result_output = stdout_buffer.getvalue()
result_error = stderr_buffer.getvalue()
        `);

        const result = pyodide.runPython("result_output + result_error");
        const hasError = pyodide.runPython("bool(result_error)");

        showConsole(result, hasError);
      } catch (err) {
        showConsole("JS/Pyodide error:\n" + String(err), true);
      }

      runBtn.disabled = false;
    };

    tabBtn.onclick = () => {
      editor.replaceSelection("    ");
      editor.focus();
    };

    clearBtn.onclick = () => {
      editor.setValue("");
      output.textContent = "";
      consoleBox.classList.remove("show");
      consoleBox.classList.remove("error");
      consoleTitle.textContent = "Console";
      editor.focus();
    };

    function fixMobileViewport() {
      const height = window.visualViewport
        ? window.visualViewport.height
        : window.innerHeight;

      document.documentElement.style.setProperty("--vh", `${height}px`);
      editor.refresh();
    }

    fixMobileViewport();

    window.addEventListener("resize", fixMobileViewport);

    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", fixMobileViewport);
      window.visualViewport.addEventListener("scroll", fixMobileViewport);
    }
  </script>
</body>
</html>
