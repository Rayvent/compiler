<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />

  <title>Python Compiler</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/theme/material-darker.css">

  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/python/python.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/display/placeholder.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/selection/active-line.js"></script>
  <script src="https://cdn.jsdelivr.net/pyodide/v0.29.3/full/pyodide.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --app-height: 100dvh;
      --bg: #0b1117;
      --panel: #121b24;
      --line: #25384a;
      --green: #4ade80;
      --green2: #22c55e;
      --text: #e8f1f8;
      --muted: #7f93a8;
      --error: #ff6b6b;
      --danger: #ef4444;

      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);

      --app-pad: 16px;
      --gap: 14px;
      --topbar-h: 56px;
      --radius: 22px;
      --console-max-h: min(42dvh, 340px);
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      min-height: 100%;
      background: var(--bg);
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
    }

    body {
      height: var(--app-height);
      background: radial-gradient(circle at top, #172636, var(--bg));
      color: var(--text);
      font-family: Inter, Arial, sans-serif;
      position: fixed;
      inset: 0;
    }

    .loader {
      position: fixed;
      inset: 0;
      background: #0b1117;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        calc(16px + var(--safe-top))
        calc(16px + var(--safe-right))
        calc(16px + var(--safe-bottom))
        calc(16px + var(--safe-left));
      transition: opacity .45s ease, visibility .45s ease;
    }

    .loader.hide {
      opacity: 0;
      visibility: hidden;
    }

    .loader-logo {
      font-size: 34px;
      font-weight: 950;
      letter-spacing: -1px;
      color: white;
      animation: pulse 1.2s infinite ease-in-out;
    }

    .loader-logo span,
    .logo span {
      color: var(--green);
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        opacity: .75;
      }

      50% {
        transform: scale(1.06);
        opacity: 1;
      }
    }

    .app {
      width: 100%;
      height: var(--app-height);
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding:
        calc(var(--app-pad) + var(--safe-top))
        calc(var(--app-pad) + var(--safe-right))
        calc(var(--app-pad) + var(--safe-bottom))
        calc(var(--app-pad) + var(--safe-left));
      gap: var(--gap);
      overflow: hidden;
    }

    .topbar {
      height: var(--topbar-h);
      min-height: var(--topbar-h);
      background: rgba(18, 27, 36, .9);
      border: 1px solid var(--line);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px 0 18px;
      flex-shrink: 0;
      backdrop-filter: blur(14px);
      overflow: hidden;
    }

    .logo {
      font-size: 20px;
      font-weight: 950;
      white-space: nowrap;
      min-width: 0;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      flex-shrink: 0;
    }

    button {
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .small-btn,
    .run-btn {
      height: 40px;
      min-width: 0;
      padding: 0 10px;
      font-size: 13px;
      line-height: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border-radius: 14px;
      font-weight: 950;
      cursor: pointer;
    }

    .run-btn {
      border: none;
      background: linear-gradient(135deg, var(--green), var(--green2));
      color: #07110b;
      font-size: 14px;
      transition: transform .2s ease, opacity .2s ease;
    }

    .run-btn:hover {
      transform: translateY(-1px);
    }

    .run-btn:disabled {
      opacity: .55;
      cursor: not-allowed;
    }

    .small-btn {
      border: 1px solid var(--line);
      background: #182634;
      color: var(--text);
    }

    .small-btn.clear {
      color: #b8ffd0;
    }

    #tabBtn {
      display: none;
    }

    .file-panel {
      min-height: 44px;
      background: rgba(18, 27, 36, .9);
      border: 1px solid var(--line);
      border-radius: 16px;
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      gap: 10px;
      font-size: 14px;
      color: var(--text);
      flex-shrink: 0;
      overflow: hidden;
    }

    .file-panel.show {
      display: flex;
    }

    #fileName {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      min-width: 0;
    }

    #deleteFileBtn {
      border: none;
      background: var(--danger);
      color: white;
      height: 32px;
      padding: 0 12px;
      border-radius: 10px;
      font-weight: 900;
      cursor: pointer;
      flex-shrink: 0;
      font-size: 13px;
    }

    .editor-wrap {
      flex: 1;
      min-height: 0;
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
    }

    .CodeMirror {
      width: 100%;
      height: 100%;
      font-family: Consolas, Monaco, monospace;
      font-size: 16px;
      line-height: 1.55;
      background: #101820 !important;
      color: var(--text);
    }

    .CodeMirror-scroll {
      max-height: 100%;
      overscroll-behavior: contain;
    }

    .CodeMirror-sizer {
      min-height: 100%;
    }

    .CodeMirror-gutters {
      background: #0f1821 !important;
      border-right: 1px solid var(--line) !important;
    }

    .CodeMirror-linenumber {
      color: var(--muted) !important;
    }

    .CodeMirror-cursor {
      border-left: 2px solid var(--green) !important;
    }

    .CodeMirror-activeline-background {
      background: rgba(74, 222, 128, .10) !important;
    }

    .CodeMirror-activeline-gutter {
      background: rgba(74, 222, 128, .08) !important;
    }

    .CodeMirror-empty.CodeMirror-focused {
      outline: none;
    }

    .CodeMirror pre.CodeMirror-placeholder {
      color: #6f7f8f !important;
      opacity: .75;
    }

    .console {
      position: fixed;
      left: calc(var(--app-pad) + var(--safe-left));
      right: calc(var(--app-pad) + var(--safe-right));
      bottom: calc(var(--app-pad) + var(--safe-bottom));
      max-height: var(--console-max-h);
      background: #07110d;
      border: 1px solid rgba(74, 222, 128, .35);
      border-radius: 22px;
      box-shadow: 0 24px 80px rgba(0,0,0,.65);
      overflow: hidden;
      z-index: 20;
      opacity: 0;
      transform: translateY(24px) scale(.98);
      pointer-events: none;
      transition: opacity .28s ease, transform .28s ease, border-color .2s ease;
    }

    .console.show {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .console.error {
      border-color: rgba(255, 107, 107, .75);
    }

    .console-head {
      height: 48px;
      min-height: 48px;
      background: #102017;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px 0 18px;
      font-weight: 950;
      color: var(--green);
    }

    .console.error .console-head {
      background: #251414;
      color: var(--error);
    }

    .close {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,.08);
      color: white;
      font-size: 20px;
      cursor: pointer;
      flex-shrink: 0;
    }

    pre {
      margin: 0;
      padding: 16px;
      white-space: pre-wrap;
      overflow: auto;
      max-height: calc(var(--console-max-h) - 48px);
      color: #c8ffd8;
      font-family: Consolas, Monaco, monospace;
      font-size: 14px;
      line-height: 1.5;
      overscroll-behavior: contain;
    }

    .console.error pre {
      color: #ffd0d0;
    }

    @media (max-width: 700px) {
      :root {
        --app-pad: 10px;
        --gap: 10px;
        --topbar-h: 52px;
        --radius: 18px;
        --console-max-h: min(38dvh, 280px);
      }

      .topbar {
        border-radius: 16px;
        padding-left: 10px;
        padding-right: 8px;
      }

      .logo {
        font-size: 16px;
      }

      #tabBtn {
        display: inline-block;
      }

      .small-btn,
      .run-btn {
        height: 38px;
        padding: 0 8px;
        font-size: 12px;
        border-radius: 12px;
      }

      .run-btn {
        font-size: 13px;
      }

      .CodeMirror {
        font-size: 16px;
      }

      .file-panel {
        min-height: 40px;
        font-size: 13px;
      }

      #deleteFileBtn {
        height: 30px;
        padding: 0 10px;
        font-size: 12px;
      }

      .console {
        border-radius: 18px;
      }

      pre {
        font-size: 13px;
      }
    }

    @media (max-width: 470px) {
      .logo {
        font-size: 13px;
      }

      .actions {
        flex: 1;
        justify-content: flex-end;
      }

      .small-btn,
      .run-btn {
        padding: 0 7px;
        font-size: 11px;
      }

      .small-btn.clear {
        max-width: 56px;
      }
    }

    @media (max-width: 390px) {
      .logo {
        display: none;
      }

      .topbar {
        justify-content: flex-end;
      }

      .actions {
        width: 100%;
        justify-content: space-between;
      }

      .small-btn,
      .run-btn {
        flex: 1;
        max-width: none;
        padding: 0 5px;
        font-size: 11px;
      }

      .small-btn.clear {
        max-width: none;
      }
    }
  </style>
</head>

<body>
  <div class="loader" id="loader">
    <div class="loader-logo">Python<span>Run</span></div>
  </div>

  <div class="app">
    <header class="topbar">
      <div class="logo">Python<span>Run</span></div>

      <div class="actions">
        <input type="file" id="fileInput" hidden>
        <button class="small-btn" id="fileBtn">File</button>
        <button class="small-btn" id="tabBtn">Tab</button>
        <button class="small-btn clear" id="clearBtn">Clear</button>
        <button class="run-btn" id="runBtn">Run</button>
      </div>
    </header>

    <div class="file-panel" id="filePanel">
      <span id="fileName">Файл не добавлен</span>
      <button id="deleteFileBtn">Delete</button>
    </div>

    <main class="editor-wrap">
      <textarea id="code" placeholder="print('hello world!')"></textarea>
    </main>
  </div>

  <section class="console" id="console">
    <div class="console-head">
      <span id="consoleTitle">Console</span>
      <button class="close" id="closeConsole">×</button>
    </div>
    <pre id="output"></pre>
  </section>

  <script>
    const runBtn = document.getElementById("runBtn");
    const consoleBox = document.getElementById("console");
    const output = document.getElementById("output");
    const closeConsole = document.getElementById("closeConsole");
    const loader = document.getElementById("loader");
    const tabBtn = document.getElementById("tabBtn");
    const clearBtn = document.getElementById("clearBtn");
    const consoleTitle = document.getElementById("consoleTitle");

    const fileInput = document.getElementById("fileInput");
    const fileBtn = document.getElementById("fileBtn");
    const filePanel = document.getElementById("filePanel");
    const fileName = document.getElementById("fileName");
    const deleteFileBtn = document.getElementById("deleteFileBtn");

    let pyodide = null;
    let mobilePairLock = false;
    let initialHeight = window.innerHeight;
    let currentFileName = null;
    let currentFileData = null;

    const editor = CodeMirror.fromTextArea(document.getElementById("code"), {
      mode: "python",
      theme: "material-darker",
      lineNumbers: true,
      placeholder: "print('hello world!')",
      indentUnit: 4,
      tabSize: 4,
      indentWithTabs: false,
      lineWrapping: false,
      autofocus: false,
      styleActiveLine: true,
      viewportMargin: Infinity,
      extraKeys: {
        Tab: function(cm) {
          cm.replaceSelection("    ");
        },
        "(": function(cm) {
          insertPair(cm, "(", ")");
        },
        "[": function(cm) {
          insertPair(cm, "[", "]");
        },
        "{": function(cm) {
          insertPair(cm, "{", "}");
        },
        "'": function(cm) {
          insertPair(cm, "'", "'");
        },
        '"': function(cm) {
          insertPair(cm, '"', '"');
        }
      }
    });

    function insertPair(cm, left, right) {
      const selected = cm.getSelection();

      if (selected) {
        cm.replaceSelection(left + selected + right);
      } else {
        cm.replaceSelection(left + right);
        const cursor = cm.getCursor();
        cm.setCursor(cursor.line, cursor.ch - right.length);
      }

      cm.focus();
    }

    editor.on("beforeChange", function(cm, change) {
      if (mobilePairLock) return;
      if (change.origin !== "+input") return;
      if (!change.text || change.text.length !== 1) return;

      const char = change.text[0];

      const pairs = {
        "(": ")",
        "[": "]",
        "{": "}",
        "'": "'",
        '"': '"'
      };

      if (!pairs[char]) return;

      mobilePairLock = true;
      change.update(change.from, change.to, [char + pairs[char]]);

      setTimeout(() => {
        const pos = cm.getCursor();
        cm.setCursor(pos.line, Math.max(0, pos.ch - 1));
        mobilePairLock = false;
      }, 0);
    });

    async function initPyodide() {
      runBtn.disabled = true;

      try {
        pyodide = await loadPyodide();
        runBtn.disabled = false;
        loader.classList.add("hide");

        if (currentFileName && currentFileData) {
          writeCurrentFileToPyodide();
        }
      } catch (err) {
        loader.classList.add("hide");
        showConsole("Ошибка загрузки Python:\n" + String(err), true);
      }
    }

    initPyodide();

    function showConsole(text, isError = false) {
      output.textContent = text || "Программа выполнена без вывода.";
      consoleTitle.textContent = isError ? "Error log" : "Console";
      consoleBox.classList.toggle("error", isError);
      consoleBox.classList.add("show");
    }

    closeConsole.onclick = () => {
      consoleBox.classList.remove("show");
    };

    function writeCurrentFileToPyodide() {
      if (!pyodide || !currentFileName || !currentFileData) return;

      try {
        pyodide.FS.writeFile(currentFileName, currentFileData);
      } catch (err) {
        showConsole("Ошибка записи файла в Python:\n" + String(err), true);
      }
    }

    fileBtn.onclick = () => {
      fileInput.click();
    };

    fileInput.onchange = async () => {
      const file = fileInput.files[0];
      if (!file) return;

      const buffer = await file.arrayBuffer();
      const data = new Uint8Array(buffer);

      if (pyodide && currentFileName) {
        try {
          pyodide.FS.unlink(currentFileName);
        } catch (_) {}
      }

      currentFileName = file.name;
      currentFileData = data;

      if (pyodide) {
        writeCurrentFileToPyodide();
      }

      fileName.textContent = `Добавлен: ${file.name}`;
      filePanel.classList.add("show");

      fileInput.value = "";
      setAppHeight();
    };
    showConsole(
      `Файл "${file.name}" добавлен.`,
      false
    );
    

    deleteFileBtn.onclick = () => {
      if (pyodide && currentFileName) {
        try {
          pyodide.FS.unlink(currentFileName);
        } catch (_) {}
      }

      currentFileName = null;
      currentFileData = null;

      fileName.textContent = "Файл не добавлен";
      filePanel.classList.remove("show");

      showConsole("Файл удалён.", false);
      setAppHeight();
    };

    runBtn.onclick = async () => {
      if (!pyodide) return;

      runBtn.disabled = true;
      showConsole("Выполнение...", false);

      const userCode = editor.getValue();

      if (!userCode.trim()) {
        showConsole("Код пустой. Напиши Python-код и нажми Run.", false);
        runBtn.disabled = false;
        return;
      }

      writeCurrentFileToPyodide();

      try {
        pyodide.globals.set("user_code", userCode);

        await pyodide.runPythonAsync(`
import sys
import io
import traceback

stdout_buffer = io.StringIO()
stderr_buffer = io.StringIO()

old_stdout = sys.stdout
old_stderr = sys.stderr

sys.stdout = stdout_buffer
sys.stderr = stderr_buffer

try:
    exec(user_code, globals())
except BaseException:
    traceback.print_exc()

sys.stdout = old_stdout
sys.stderr = old_stderr

result_output = stdout_buffer.getvalue()
result_error = stderr_buffer.getvalue()
        `);

        const result = pyodide.runPython("result_output + result_error");
        const hasError = pyodide.runPython("bool(result_error)");

        showConsole(result, hasError);
      } catch (err) {
        showConsole("JS/Pyodide error:\n" + String(err), true);
      }

      runBtn.disabled = false;
    };

    tabBtn.onclick = () => {
      editor.replaceSelection("    ");
      editor.focus();
    };

    clearBtn.onclick = () => {
      editor.setValue("");
      output.textContent = "";
      consoleBox.classList.remove("show");
      consoleBox.classList.remove("error");
      consoleTitle.textContent = "Console";
      editor.focus();
    };

    function setAppHeight() {
      let height;

      if (window.visualViewport) {
        height = window.visualViewport.height;
      } else {
        height = window.innerHeight;
      }

      if (!height || height < 320) {
        height = initialHeight;
      }

      document.documentElement.style.setProperty("--app-height", `${height}px`);

      requestAnimationFrame(() => {
        editor.setSize("100%", "100%");
        editor.refresh();
      });
    }

    setAppHeight();

    window.addEventListener("resize", setAppHeight, { passive: true });
    window.addEventListener("orientationchange", () => {
      setTimeout(() => {
        initialHeight = window.innerHeight;
        setAppHeight();
      }, 250);
    });

    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", setAppHeight, { passive: true });
      window.visualViewport.addEventListener("scroll", setAppHeight, { passive: true });
    }

    document.addEventListener("gesturestart", function(e) {
      e.preventDefault();
    });

    document.addEventListener("touchmove", function(e) {
      if (!e.target.closest(".CodeMirror-scroll") && !e.target.closest("pre")) {
        e.preventDefault();
      }
    }, { passive: false });
  </script>
</body>
</html>
